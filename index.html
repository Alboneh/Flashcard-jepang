<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcard Kosakata Bab 1-7</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="flashcard_kosakata_bab1_10.css">
</head>
<body>

<div class="fc-wrap">
  <div class="header">
    <h1>🎌 Kosakata Jepang</h1>
    <span class="header-subtitle">Bab 1-8: Kosakata</span>
    <div class="page-nav" aria-label="Navigasi halaman belajar">
      <a class="page-nav-link active" href="index.html">Kosakata</a>
      <a class="page-nav-link" href="semua_kosakata.html">Semua Kosakata</a>
      <a class="page-nav-link" href="bunpo.html">Bunpo</a>
      <a class="page-nav-link" href="kanji.html">Kanji</a>
      <a class="page-nav-link" href="kanji-belajar.html">Belajar Kanji</a>
      <a class="page-nav-link" href="latihan.html">Latihan Vocab</a>
      <a class="page-nav-link" href="latihan_kanji.html">Latihan Kanji</a>
      <a class="page-nav-link" href="latihan_bunpo.html">Latihan Bunpo</a>
    </div>
  </div>
  
  <div class="tab-row">
    <button class="tab active" data-mode="flash" onclick="setMode('flash')">🎴 Flashcard</button>
    <button class="tab" data-mode="auto" onclick="setMode('auto')">🔊 Auto Voice</button>
  </div>
  
  <div class="controls">
    <div class="search-row">
      <div class="multi-select" id="babFilter">
        <button type="button" class="multi-select-btn" id="babFilterBtn" onclick="toggleBabDropdown()">Filter Bab: Semua</button>
        <div class="multi-select-panel" id="babFilterPanel">
          <label class="multi-option"><input type="checkbox" value="Bab 1" onchange="onBabSelectionChange()"><span>Bab 1 - Perkenalan</span></label>
          <label class="multi-option"><input type="checkbox" value="Bab 2" onchange="onBabSelectionChange()"><span>Bab 2 - Benda</span></label>
          <label class="multi-option"><input type="checkbox" value="Bab 3" onchange="onBabSelectionChange()"><span>Bab 3 - Tempat</span></label>
          <label class="multi-option"><input type="checkbox" value="Bab 4" onchange="onBabSelectionChange()"><span>Bab 4 - Waktu & Jam</span></label>
          <label class="multi-option"><input type="checkbox" value="Bab 5" onchange="onBabSelectionChange()"><span>Bab 5 - Transportasi</span></label>
          <label class="multi-option"><input type="checkbox" value="Bab 6" onchange="onBabSelectionChange()"><span>Bab 6 - Aktivitas & Makanan</span></label>
          <label class="multi-option"><input type="checkbox" value="Bab 7" onchange="onBabSelectionChange()"><span>Bab 7 - Memberi, Menerima, & Benda</span></label>
          <label class="multi-option"><input type="checkbox" value="Bab 8" onchange="onBabSelectionChange()"><span>Bab 8 - Sifat, Kehidupan, & Ungkapan</span></label>
          <label class="multi-option"><input type="checkbox" value="Bab 9" onchange="onBabSelectionChange()"><span>Bab 9 - Kesukaan dan Kemahiran</span></label>
          <label class="multi-option"><input type="checkbox" value="Bab 10" onchange="onBabSelectionChange()"><span>Bab 10 - Keberadaan & Posisi</span></label>
          <div class="multi-actions">
            <button type="button" onclick="selectAllBabs()">Pilih Semua</button>
            <button type="button" onclick="clearAllBabs()">Reset</button>
          </div>
        </div>
      </div>
      <input id="search" type="text" placeholder="Cari kata..." oninput="filterCards()" />
      <span class="stats" id="stats"></span>
    </div>
  </div>

  <div id="flashMode">
    <div class="card-area">
      <div class="flashcard" onclick="flipCard()" id="fc">
        <div class="card-front" id="front">
          <div class="card-jp" id="fcJp"></div>
          <div class="card-hint">Ketuk untuk melihat arti</div>
        </div>
        <div class="card-back" id="back">
          <div class="card-id" id="fcRomaji"></div>
          <div class="card-meaning" id="fcMeaning"></div>
          <div class="card-cat" id="fcCat"></div>
        </div>
      </div>
      <div class="nav-row">
        <button onclick="prev()">← Prev</button>
        <span class="progress" id="prog"></span>
        <button onclick="next()">Next →</button>
      </div>
      <div class="nav-row">
        <button onclick="speakCurrentCard()">🔊 Baca: Jepang lalu arti</button>
      </div>
      <div class="nav-row">
        <button id="reverseBtn" onclick="toggleReverseMode()">↔ Reverse: OFF (Jepang dulu)</button>
      </div>
      <div class="header-subtitle" id="autoVoiceStatus" style="text-align:center; margin-top:4px;"></div>
      <button class="shuffle-btn" onclick="shuffle()">🔀 Acak Urutan</button>
    </div>
  </div>

</div>

<script src="database.js"></script>
<script src="flashcard_kosakata_bab1_10.js"></script>

</body>
</html>
