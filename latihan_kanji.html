<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latihan Kanji Jepang</title>
  <link rel="stylesheet" href="latihan.css">
</head>
<body>

<div class="fc-wrap">
  <div class="header">
    <h1>📝 Latihan Kanji</h1>
    <span class="header-subtitle">Uji kemampuan membaca kanji</span>
    <div class="page-nav" aria-label="Navigasi halaman belajar">
      <a class="page-nav-link" href="index.html">Kosakata</a>
      <a class="page-nav-link" href="bunpo.html">Bunpo</a>
      <a class="page-nav-link" href="kanji.html">Kanji</a>
      <a class="page-nav-link" href="latihan.html">Latihan Vocab</a>
      <a class="page-nav-link active" href="latihan_kanji.html">Latihan Kanji</a>
      <a class="page-nav-link" href="latihan_bunpo.html">Latihan Bunpo</a>
    </div>
  </div>

  <div class="controls">
    <div class="bab-selection">
      <label class="bab-label">Pilih Bab (bisa lebih dari satu):</label>
      <div class="bab-grid">
        <label class="bab-checkbox">
          <input type="checkbox" value="Bab 1" onchange="startNewExercise()">
          <span>Bab 1</span>
        </label>
        <label class="bab-checkbox">
          <input type="checkbox" value="Bab 2" onchange="startNewExercise()">
          <span>Bab 2</span>
        </label>
        <label class="bab-checkbox">
          <input type="checkbox" value="Bab 3" onchange="startNewExercise()">
          <span>Bab 3</span>
        </label>
        <label class="bab-checkbox">
          <input type="checkbox" value="Bab 4" onchange="startNewExercise()">
          <span>Bab 4</span>
        </label>
        <label class="bab-checkbox">
          <input type="checkbox" value="Bab 5" onchange="startNewExercise()">
          <span>Bab 5</span>
        </label>
        <label class="bab-checkbox">
          <input type="checkbox" value="Bab 6" onchange="startNewExercise()">
          <span>Bab 6</span>
        </label>
        <label class="bab-checkbox">
          <input type="checkbox" value="Bab 7" onchange="startNewExercise()">
          <span>Bab 7</span>
        </label>
        <label class="bab-checkbox">
          <input type="checkbox" value="Bab 8" onchange="startNewExercise()">
          <span>Bab 8</span>
        </label>
      </div>
    </div>
    <div class="question-type-row">
      <div class="question-type-group">
        <div class="question-type-title">Dari Kanji</div>
        <label>
          <input type="radio" name="questionType" value="kanji-to-meaning" onchange="startNewExercise()">
          <span>→ Arti</span>
        </label>
        <label>
          <input type="radio" name="questionType" value="kanji-to-onyomi" onchange="startNewExercise()">
          <span>→ Onyomi</span>
        </label>
        <label>
          <input type="radio" name="questionType" value="kanji-to-kunyomi" onchange="startNewExercise()">
          <span>→ Kunyomi</span>
        </label>
      </div>

      <div class="question-type-group">
        <div class="question-type-title">Ke Kanji</div>
        <label>
          <input type="radio" name="questionType" value="meaning-to-kanji" onchange="startNewExercise()">
          <span>Arti →</span>
        </label>
        <label>
          <input type="radio" name="questionType" value="onyomi-to-kanji" onchange="startNewExercise()">
          <span>Onyomi →</span>
        </label>
        <label>
          <input type="radio" name="questionType" value="kunyomi-to-kanji" onchange="startNewExercise()">
          <span>Kunyomi →</span>
        </label>
      </div>

      <div class="question-type-group">
        <div class="question-type-title">Mode</div>
        <label>
          <input type="radio" name="questionType" value="campur" checked onchange="startNewExercise()">
          <span>Campur Semua</span>
        </label>
      </div>
    </div>
  </div>

  <div id="exerciseContainer" style="display: none;">
    <div class="question-card">
      <div class="progress-bar">
        <span id="progressText">0/0</span>
        <div class="progress-line">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
      <div class="question-area">
        <div class="question-label" id="questionLabel">Apa arti kanji ini?</div>
        <div class="question-content kanji-question" id="questionContent">日</div>
      </div>

      <div id="multipleChoiceMode">
        <div class="options-grid" id="optionsGrid"></div>
      </div>

      <div id="feedbackArea" style="display:none;" class="feedback-area">
        <div id="feedbackContent"></div>
        <button onclick="nextQuestion()" class="next-btn">Soal Berikutnya →</button>
      </div>
    </div>

    <div class="stats-area">
      <div class="stat-item">
        <span class="stat-label">Benar</span>
        <span class="stat-value" id="correctCount">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Salah</span>
        <span class="stat-value" id="wrongCount">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Tingkat Akurasi</span>
        <span class="stat-value" id="accuracyRate">0%</span>
      </div>
    </div>
  </div>

  <div id="noDataMessage" style="display:none;" class="no-data-message">
    <p>Silakan pilih minimal satu Bab untuk memulai latihan</p>
  </div>
</div>

<script src="kanji_database.js"></script>
<script src="latihan_kanji.js"></script>

</body>
</html>
